name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm exec nx affected -t lint --parallel=3

      - name: Lint all
        run: pnpm exec nx run-many -t lint --parallel=3

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Test affected
        run: pnpm exec nx affected -t test --parallel=3 --ci

      - name: Test all
        run: pnpm exec nx run-many -t test --parallel=3 --ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Append PR version
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/append-pr-version.cjs

      - name: Build affected
        run: pnpm exec nx affected -t build --parallel=3

      - name: Build all
        run: pnpm exec nx run-many -t build --parallel=3

      - name: Upload artifact
        if: github.event_name == 'pull_request'
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Idler-PR-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          path: dist
          if-no-files-found: error

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: false
          tags: steam-idler-client:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          outputs: type=docker,dest=/tmp/steam-idler-client.tar

      - name: Build server image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: steam-idler-server:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          outputs: type=docker,dest=/tmp/steam-idler-server.tar

      - name: Upload client image
        if: github.event_name == 'pull_request'
        id: upload-client
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Idler-Client-PR-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          path: /tmp/steam-idler-client.tar
          if-no-files-found: error

      - name: Upload server image
        if: github.event_name == 'pull_request'
        id: upload-server
        uses: actions/upload-artifact@v4
        with:
          name: Steam-Idler-Server-PR-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          path: /tmp/steam-idler-server.tar
          if-no-files-found: error

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_COMMIT_COUNT: ${{ github.event.pull_request.commits }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          CLIENT_IMAGE_TAG: steam-idler-client:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          SERVER_IMAGE_TAG: steam-idler-server:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.commits }}
          CLIENT_IMAGE_URL: ${{ steps.upload-client.outputs.artifact-url }}
          SERVER_IMAGE_URL: ${{ steps.upload-server.outputs.artifact-url }}
        with:
          script: |
            const script = require('./.github/scripts/comment-pr.cjs');
            await script({ github, context });
