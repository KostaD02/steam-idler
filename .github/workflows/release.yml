name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

      - uses: ./.github/actions/setup

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture current version
        id: before
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Run nx release
        run: pnpm exec nx release --skip-publish

      - name: Resolve release result
        id: result
        run: |
          AFTER=$(node -p "require('./package.json').version")
          echo "version=$AFTER" >> "$GITHUB_OUTPUT"
          if [ "$AFTER" != "${{ steps.before.outputs.version }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No releasable commits — version unchanged at $AFTER. Skipping release."
          fi

      - name: Push release commit and tag
        if: steps.result.outputs.released == 'true'
        run: git push --follow-tags

      - name: Build apps
        if: steps.result.outputs.released == 'true'
        run: pnpm exec nx run-many -t build --parallel=3

      - name: Package build artifact
        if: steps.result.outputs.released == 'true'
        run: |
          cd dist
          zip -r "../steam-idler-${{ steps.result.outputs.version }}.zip" .
          cd ..
          ls -lh "steam-idler-${{ steps.result.outputs.version }}.zip"

      - name: Render release notes
        if: steps.result.outputs.released == 'true'
        run: sed "s/__VERSION__/${{ steps.result.outputs.version }}/g" .github/release-template.md > release-notes.md

      - name: Create GitHub Release
        if: steps.result.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.result.outputs.version }}
          name: v${{ steps.result.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          make_latest: true
          files: steam-idler-${{ steps.result.outputs.version }}.zip
