name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Decide the bump from conventional commits since the last tag:
  # breaking -> major, feat -> minor, fix -> patch, anything else -> none (no release).
  check:
    name: Check for releasable commits
    runs-on: ubuntu-latest
    outputs:
      specifier: ${{ steps.bump.outputs.specifier }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then RANGE="$LAST_TAG..HEAD"; else RANGE="HEAD"; fi
          SUBJECTS=$(git log "$RANGE" --format='%s')
          BODIES=$(git log "$RANGE" --format='%b')
          if echo "$SUBJECTS" | grep -qE '^[a-z]+(\([^)]*\))?!:' || echo "$BODIES" | grep -qE 'BREAKING[ -]CHANGE'; then
            SPECIFIER=major
          elif echo "$SUBJECTS" | grep -qE '^feat(\([^)]*\))?:'; then
            SPECIFIER=minor
          elif echo "$SUBJECTS" | grep -qE '^fix(\([^)]*\))?:'; then
            SPECIFIER=patch
          else
            SPECIFIER=none
            echo "::notice::No feat/fix/breaking commits since ${LAST_TAG:-start} - skipping release."
          fi
          echo "specifier=$SPECIFIER" >> "$GITHUB_OUTPUT"
          echo "Range '${RANGE}' -> bump '${SPECIFIER}'"

  release:
    name: Release
    needs: check
    if: needs.check.outputs.specifier != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SPECIFIER: ${{ needs.check.outputs.specifier }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

      - uses: ./.github/actions/setup

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run nx release
        run: pnpm exec nx release "$SPECIFIER" --skip-publish

      - name: Read new version
        id: v
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: git push --follow-tags

      - name: Build apps
        run: pnpm exec nx run-many -t build --parallel=3

      - name: Package build artifact
        run: |
          cd dist
          zip -r "../steam-idler-${{ steps.v.outputs.version }}.zip" .
          cd ..
          ls -lh "steam-idler-${{ steps.v.outputs.version }}.zip"

      - name: Render release notes
        run: sed "s/__VERSION__/${{ steps.v.outputs.version }}/g" .github/release-template.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: v${{ steps.v.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          make_latest: true
          files: steam-idler-${{ steps.v.outputs.version }}.zip
