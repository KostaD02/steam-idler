# Local development dependencies only.
#
#
# Usage:
#   pnpm db:up      # start
#   pnpm db:down    # stop (data preserved in named volume)

services:
  steam-idler-mongodb:
    image: mongo:7
    container_name: steam-idler-mongodb
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  steam-idler-redis:
    image: redis:7-alpine
    container_name: steam-idler-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  mongo_data:
