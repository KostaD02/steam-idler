<header
  class="header"
  [style]="{
    '--header-height': sizing.header + 'px',
    '--header-padding': sizing.innerPadding + 'px',
  }"
>
  <nav class="header__inner">
    <a
      routerLink="/"
      class="header__logo kd-header-anchor"
      (click)="isSideNavOpen.set(false)"
    >
      Steam Idler
    </a>

    <div class="header__actions">
      @if (!isMobileView()) {
        <ng-container *ngTemplateOutlet="navigation"></ng-container>
      }
      <ng-container *ngTemplateOutlet="githubLink"></ng-container>
      <si-language-switcher></si-language-switcher>
      <ng-container *ngTemplateOutlet="themeToggle"></ng-container>
      @if (isAuthenticated()) {
        <ng-container *ngTemplateOutlet="signOutButton"></ng-container>
      }
      @if (isMobileView()) {
        <ng-container *ngTemplateOutlet="burger"></ng-container>
      }
    </div>
  </nav>
</header>

@if (isMobileView()) {
  <div
    class="header-backdrop"
    [class.header-backdrop--open]="isSideNavOpen()"
    aria-hidden="true"
    (click)="isSideNavOpen.set(false)"
  ></div>

  <aside
    class="header-drawer"
    [style]="{ '--header-height': sizing.header + 'px' }"
    [class.header-drawer--open]="isSideNavOpen()"
    [attr.aria-hidden]="!isSideNavOpen()"
  >
    <ng-container *ngTemplateOutlet="navigation"></ng-container>
  </aside>
}

<ng-template #navigation>
  <ul class="header__nav">
    @for (item of navigationItems(); track item.path) {
      <li>
        <a
          [routerLink]="item.path"
          routerLinkActive="kd-active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          class="kd-header-anchor"
          (click)="isSideNavOpen.set(false)"
        >
          {{ item.labelKey | translate }}
        </a>
      </li>
    }
  </ul>
</ng-template>

<ng-template #themeToggle>
  <button
    class="header__theme-toggle"
    type="button"
    [attr.aria-label]="
      (isDarkTheme()
        ? 'ui.header.aria.theme_light'
        : 'ui.header.aria.theme_dark'
      ) | translate
    "
    (click)="toggleTheme()"
  >
    <svg aria-hidden="true">
      <use
        [attr.href]="
          isDarkTheme() ? '/icons/sun.svg#root' : '/icons/moon.svg#root'
        "
      />
    </svg>
  </button>
</ng-template>

<ng-template #githubLink>
  <a
    class="header__github kd-header-anchor"
    href="https://github.com/KostaD02/steam-idler"
    target="_blank"
    rel="noopener noreferrer"
    [attr.aria-label]="'ui.header.aria.github' | translate"
  >
    <svg aria-hidden="true">
      <use href="/icons/github.svg#root" />
    </svg>
  </a>
</ng-template>

<ng-template #signOutButton>
  <button
    class="header__sign-out"
    type="button"
    [attr.aria-label]="'ui.header.aria.sign_out' | translate"
    (click)="signOut()"
  >
    <svg aria-hidden="true">
      <use href="/icons/sign-out.svg#root" />
    </svg>
  </button>
</ng-template>

<ng-template #burger>
  <button
    class="header__burger"
    [class.header__burger--open]="isSideNavOpen()"
    type="button"
    [attr.aria-label]="
      (isSideNavOpen()
        ? 'ui.header.aria.menu_close'
        : 'ui.header.aria.menu_open'
      ) | translate
    "
    [attr.aria-expanded]="isSideNavOpen()"
    (click)="isSideNavOpen.set(!isSideNavOpen())"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>
</ng-template>
