services:
  steam-idler-mongo:
    image: mongo:7
    container_name: steam-idler-mongo
    ports:
      - '27018:27017'
    volumes:
      - steam-idler-mongo-data:/data/db
    networks:
      - steam-idler-net
    logging:
      driver: none
    restart: unless-stopped

  steam-idler-redis:
    image: redis:7-alpine
    container_name: steam-idler-redis
    networks:
      - steam-idler-net
    logging:
      driver: none
    restart: unless-stopped

  steam-idler-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: steam-idler-server:local
    container_name: steam-idler-server
    depends_on:
      - steam-idler-mongo
      - steam-idler-redis
    ports:
      - '${SERVER_PORT:-2221}:${SERVER_PORT:-2221}'
    environment:
      SERVER_PORT: ${SERVER_PORT:-2221}
      SERVER_LOG_TYPE: ${SERVER_LOG_TYPE:-2}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-please-override-1234567890}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1}
      DATABASE_URL: mongodb://steam-idler-mongo:27017/steam-idler
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: steam-idler-redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TTL: ${REDIS_TTL:-300000}
    networks:
      - steam-idler-net
    restart: unless-stopped

  steam-idler-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: steam-idler-client:local
    container_name: steam-idler-client
    depends_on:
      - steam-idler-server
    ports:
      - '${CLIENT_PORT:-2222}:${CLIENT_PORT:-2222}'
    environment:
      CLIENT_PORT: ${CLIENT_PORT:-2222}
    networks:
      - steam-idler-net
    restart: unless-stopped

networks:
  steam-idler-net:
    driver: bridge

volumes:
  steam-idler-mongo-data:
